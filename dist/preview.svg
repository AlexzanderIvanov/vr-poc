<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Dark tech-panel background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e14"/>
      <stop offset="0.5" stop-color="#121722"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>

    <!-- Racing line glow -->
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4dd0e1"/>
      <stop offset="0.5" stop-color="#ffeb3b"/>
      <stop offset="1" stop-color="#f44336"/>
    </linearGradient>

    <!-- Asphalt surface -->
    <linearGradient id="asphalt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2d33"/>
      <stop offset="1" stop-color="#1a1c21"/>
    </linearGradient>

    <!-- RPM bar -->
    <linearGradient id="rpmGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4caf50"/>
      <stop offset="0.7" stop-color="#ffeb3b"/>
      <stop offset="1" stop-color="#f44336"/>
    </linearGradient>

    <!-- Soft glow filter for accents -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline / grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2330" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.7"/>

  <!-- Ambient cyan glow in the corners -->
  <circle cx="100" cy="100" r="200" fill="#4dd0e1" opacity="0.06"/>
  <circle cx="1100" cy="530" r="250" fill="#f44336" opacity="0.06"/>

  <!-- === Left side: track + car silhouette === -->

  <!-- Track base (asphalt strip) -->
  <g transform="translate(70, 110)">
    <!-- Outer grey run-off -->
    <path d="M 0 280 C 60 180, 180 140, 280 160 S 460 320, 500 380 L 500 420 L 0 420 Z"
          fill="#222428" opacity="0.7"/>

    <!-- Red painted extension strips (kerb continuation) -->
    <path d="M 10 280 C 70 185, 185 150, 280 170 S 450 330, 485 375"
          fill="none" stroke="#b0322a" stroke-width="18" stroke-linecap="round" opacity="0.9"/>

    <!-- Main asphalt ribbon -->
    <path d="M 10 285 C 70 190, 185 155, 280 175 S 450 335, 485 380"
          fill="none" stroke="url(#asphalt)" stroke-width="48" stroke-linecap="round"/>

    <!-- Lane marking -->
    <path d="M 10 285 C 70 190, 185 155, 280 175 S 450 335, 485 380"
          fill="none" stroke="#e8e8e8" stroke-width="1.5"
          stroke-dasharray="10 18" opacity="0.5"/>

    <!-- Red/white kerbs on the inside of the first corner -->
    <g opacity="0.9">
      <path d="M 240 170 L 270 170 L 275 185 L 245 185 Z" fill="#ef4444"/>
      <path d="M 275 185 L 305 186 L 312 200 L 280 198 Z" fill="#ffffff"/>
      <path d="M 312 200 L 340 205 L 349 220 L 318 212 Z" fill="#ef4444"/>
    </g>

    <!-- Racing line glow -->
    <path d="M 10 295 C 70 200, 190 170, 285 190 S 450 345, 490 385"
          fill="none" stroke="url(#track)" stroke-width="2.5"
          opacity="0.95" filter="url(#glow)"/>

    <!-- Cyan reference-car ghost trail dots -->
    <g filter="url(#glow)">
      <circle cx="110" cy="215" r="5" fill="#4dd0e1" opacity="0.6"/>
      <circle cx="170" cy="188" r="5" fill="#4dd0e1" opacity="0.8"/>
      <circle cx="230" cy="177" r="6" fill="#4dd0e1"/>
    </g>

    <!-- Red ghost-car trail dots (slightly offset - the comparison lap) -->
    <g filter="url(#glow)" opacity="0.75">
      <circle cx="118" cy="228" r="4" fill="#f44336" opacity="0.5"/>
      <circle cx="178" cy="202" r="4" fill="#f44336" opacity="0.7"/>
      <circle cx="238" cy="192" r="5" fill="#f44336"/>
    </g>

    <!-- Focus dot / current car position (big) -->
    <g filter="url(#softGlow)">
      <circle cx="300" cy="200" r="10" fill="#4dd0e1"/>
      <circle cx="300" cy="200" r="4" fill="#ffffff"/>
    </g>

    <!-- Sector labels along the track -->
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#8892ab" font-weight="700" letter-spacing="1">
      <text x="40"  y="310">S1</text>
      <text x="180" y="142">S2</text>
      <text x="340" y="210">S3</text>
      <text x="470" y="360">S4</text>
    </g>
  </g>

  <!-- === Right side: telemetry HUD panel === -->

  <g transform="translate(710, 90)">
    <!-- Frame -->
    <rect x="0" y="0" width="420" height="450" rx="14" ry="14"
          fill="#0f131b" stroke="#2a2f3d" stroke-width="1"/>
    <rect x="0" y="0" width="420" height="38" rx="14" ry="14" fill="#161b26"/>
    <rect x="0" y="28" width="420" height="10" fill="#161b26"/>

    <!-- Header -->
    <text x="20" y="25" font-family="Inter,system-ui,sans-serif" font-size="12"
          font-weight="800" fill="#8892ab" letter-spacing="3">LIVE  TELEMETRY</text>
    <circle cx="390" cy="19" r="5" fill="#4caf50" filter="url(#glow)"/>

    <!-- Delta big number -->
    <g transform="translate(20, 80)">
      <text font-family="Inter,system-ui,sans-serif" font-size="11"
            font-weight="700" fill="#8892ab" letter-spacing="3">LAP  DELTA</text>
      <text y="56" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="64"
            font-weight="900" fill="#4caf50" filter="url(#glow)">−0.482s</text>
      <text x="270" y="56" font-family="Inter,system-ui,sans-serif" font-size="14"
            font-weight="700" fill="#4caf50">AHEAD</text>
    </g>

    <!-- Divider -->
    <line x1="20" y1="170" x2="400" y2="170" stroke="#1f2531" stroke-width="1"/>

    <!-- TPS -->
    <g transform="translate(20, 195)">
      <text font-family="Inter,system-ui,sans-serif" font-size="11"
            font-weight="700" fill="#8892ab" letter-spacing="2">TPS</text>
      <text x="365" font-family="ui-monospace,monospace" font-size="13"
            font-weight="700" fill="#e6edf7" text-anchor="end">87%</text>
      <rect x="0" y="14" width="380" height="12" rx="6" fill="#161b26"/>
      <rect x="0" y="14" width="330" height="12" rx="6" fill="#4caf50" filter="url(#glow)"/>
    </g>

    <!-- Brake -->
    <g transform="translate(20, 240)">
      <text font-family="Inter,system-ui,sans-serif" font-size="11"
            font-weight="700" fill="#8892ab" letter-spacing="2">BRAKE</text>
      <text x="365" font-family="ui-monospace,monospace" font-size="13"
            font-weight="700" fill="#e6edf7" text-anchor="end">8%</text>
      <rect x="0" y="14" width="380" height="12" rx="6" fill="#161b26"/>
      <rect x="0" y="14" width="30" height="12" rx="6" fill="#f44336" filter="url(#glow)"/>
    </g>

    <!-- RPM -->
    <g transform="translate(20, 285)">
      <text font-family="Inter,system-ui,sans-serif" font-size="11"
            font-weight="700" fill="#8892ab" letter-spacing="2">RPM</text>
      <text x="365" font-family="ui-monospace,monospace" font-size="13"
            font-weight="700" fill="#e6edf7" text-anchor="end">6240</text>
      <rect x="0" y="14" width="380" height="12" rx="6" fill="#161b26"/>
      <rect x="0" y="14" width="290" height="12" rx="6" fill="url(#rpmGrad)" filter="url(#glow)"/>
    </g>

    <!-- Speed / Steer two-up -->
    <g transform="translate(20, 340)">
      <g>
        <text font-family="Inter,system-ui,sans-serif" font-size="10"
              font-weight="700" fill="#8892ab" letter-spacing="2">SPEED</text>
        <text y="34" font-family="ui-monospace,monospace" font-size="30"
              font-weight="800" fill="#e6edf7">186<tspan font-size="14" fill="#8892ab" dx="4">km/h</tspan></text>
      </g>
      <g transform="translate(210, 0)">
        <text font-family="Inter,system-ui,sans-serif" font-size="10"
              font-weight="700" fill="#8892ab" letter-spacing="2">GEAR</text>
        <text y="34" font-family="ui-monospace,monospace" font-size="30"
              font-weight="800" fill="#ffeb3b">4</text>
      </g>
    </g>

    <!-- Sparkline waveform bottom -->
    <g transform="translate(20, 400)" opacity="0.9">
      <polyline fill="none" stroke="#4dd0e1" stroke-width="1.6"
        points="0,18 12,12 24,16 36,10 48,22 60,8 72,14 84,20 96,6 108,14 120,22 132,10 144,18 156,8 168,14 180,4 192,14 204,24 216,12 228,18 240,8 252,16 264,10 276,22 288,14 300,8 312,20 324,10 336,18 348,12 360,22 380,10"/>
      <polyline fill="none" stroke="#f44336" stroke-width="1.6" opacity="0.75"
        points="0,22 12,16 24,20 36,14 48,24 60,12 72,18 84,22 96,10 108,18 120,24 132,14 144,22 156,12 168,18 180,8 192,18 204,26 216,16 228,20 240,14 252,20 264,14 276,24 288,18 300,12 312,22 324,14 336,22 348,16 360,24 380,14"/>
    </g>
  </g>

  <!-- === Top banner: title === -->
  <g transform="translate(70, 50)">
    <text font-family="Inter,system-ui,sans-serif" font-size="14"
          font-weight="800" fill="#4dd0e1" letter-spacing="6" filter="url(#glow)">RACE · AI</text>
    <text y="48" font-family="Inter,system-ui,sans-serif" font-size="44"
          font-weight="900" fill="#ffffff" letter-spacing="-1">
      Next-gen race telemetry
    </text>
  </g>

  <!-- === Bottom footer: context === -->
  <g transform="translate(70, 560)" font-family="Inter,system-ui,sans-serif">
    <text font-size="13" font-weight="700" fill="#b7bfd8" letter-spacing="2">
      3D LAP REPLAY  ·  GPS + IMU + CAN-BUS  ·  A1 MOTOR PARK
    </text>
    <text y="26" font-size="11" font-weight="500" fill="#5b637a" letter-spacing="1">
      Ghost-lap comparison · Sector analysis · Interactive track map · Mobile-ready
    </text>
  </g>

  <!-- Corner tag -->
  <g transform="translate(1090, 560)">
    <rect x="-40" y="-22" width="80" height="28" rx="6" fill="none" stroke="#4dd0e1" stroke-width="1" opacity="0.5"/>
    <text font-family="ui-monospace,monospace" font-size="11" font-weight="800"
          fill="#4dd0e1" text-anchor="middle" y="-5" letter-spacing="2">v1.0</text>
  </g>
</svg>
