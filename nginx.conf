server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large 3D / video / orthophoto downloads
    client_max_body_size 200m;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Start from nginx's default MIME map, then layer 3D/wasm types on top.
    # NOTE: a bare `types { ... }` block REPLACES the defaults — which makes
    # nginx serve index.html as application/octet-stream and the browser
    # downloads the page instead of rendering it.
    include /etc/nginx/mime.types;
    types {
        model/gltf-binary  glb;
        model/gltf+json    gltf;
        image/ktx2         ktx2;
        application/wasm   wasm;
    }
    default_type application/octet-stream;

    # gzip for text-y assets (GLB/PNG/JPG already compressed — skip)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # Healthcheck endpoint for Docker/Traefik
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Long-cache hashed build assets (Vite emits content-hashed filenames)
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Hashed JS/CSS at root (if any)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|ktx2|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Large 3D / image / video assets — long cache with `immutable`.
    # The manifest's `?v=…` query string acts as the cache-bust key:
    # bumping it (e.g. when re-baking a track GLB) changes the request
    # URL and forces a fresh fetch. Without `immutable` the browser
    # would still send conditional revalidation requests
    # (If-None-Match) on every reload — slow for 70+ MB GLBs even when
    # the response is a 304.
    location ~* \.(?:glb|gltf|png|jpg|jpeg|webp|svg|mp4|webm|tif|tiff)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Accept-Ranges bytes;
        try_files $uri =404;
    }

    # SPA fallback — never cache the shell
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
        try_files $uri $uri/ /index.html;
    }
}